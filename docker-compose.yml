services:
  webapp:
    build: .
    container_name: medivault-webapp
    hostname: webapp
    ports:
      - "80:5000"      # Flask main application (hospital website)
      - "8080:8080"    # Apache/PHP (serves uploads directory)
      - "22:22"        # SSH
    networks:
      healthnet:
        ipv4_address: 172.20.0.10
    restart: unless-stopped

  monitor:
    build: ./monitor
    container_name: medivault-monitor
    hostname: monitor
    # Port NOT exposed externally — internal network only
    expose:
      - "8080"
    networks:
      healthnet:
        ipv4_address: 172.20.0.20
    restart: unless-stopped

networks:
  healthnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
