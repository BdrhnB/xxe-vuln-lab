services:
  webapp:
    build: .
    container_name: medivault-webapp
    hostname: webapp
    ports:
      - "5001:5000"    # Flask ana uygulama
      - "8082:8080"    # Apache/PHP (uploads dizini icin)
      - "2223:22"      # SSH
    networks:
      healthnet:
        ipv4_address: 172.20.0.10
    restart: unless-stopped

  monitor:
    build: ./monitor
    container_name: medivault-monitor
    hostname: monitor
    # Port disariya acik DEGIL — sadece internal agdan erisilebilir
    expose:
      - "8080"
    networks:
      healthnet:
        ipv4_address: 172.20.0.20
    restart: unless-stopped

networks:
  healthnet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/24
